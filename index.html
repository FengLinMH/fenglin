<!DOCTYPE html>
<html lang="zh">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
		<title>凤鳞毛鸿 · 阅读储藏</title>
		<style>
			/* === 极简重置 + 防复制 === */
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
				user-select: none;
				-webkit-user-select: none;
				-moz-user-select: none;
				-ms-user-select: none;
			}

			body {
				background: #ece3d8;
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Georgia", "Times New Roman", "Songti SC", serif;
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 0;
			}

			/* 阅读卡片 - 全屏模式 */
			.reader {
				width: 100%;
				max-width: 100%;
				height: 100vh;
				background: #fdf9f2;
				box-shadow: none;
				padding: 16px 16px 14px 16px;
				border: none;
				border-radius: 0;
				display: flex;
				flex-direction: column;
				position: relative;
			}

			/* 头部：主人名 + 章节标记 */
			.reader-header {
				display: flex;
				flex-wrap: wrap;
				align-items: baseline;
				justify-content: space-between;
				margin-bottom: 8px;
				padding-bottom: 8px;
				border-bottom: 1px solid #dacfc1;
				gap: 8px;
				flex-shrink: 0;
			}

			.owner-name {
				font-size: 1.6rem;
				font-weight: 340;
				color: #3b2e24;
				letter-spacing: 1.5px;
			}

			.owner-name small {
				font-size: 0.9rem;
				font-weight: 300;
				color: #8b715b;
				margin-left: 4px;
				letter-spacing: 0.5px;
			}

			/* 章节选择器 */
			.chapter-bar {
				display: flex;
				align-items: center;
				gap: 8px;
				flex-wrap: wrap;
			}

			.chapter-select-wrap {
				position: relative;
				min-width: 150px;
			}

			#chapterSelect {
				background: #f0e8dd;
				border: 1px solid #cbbaa8;
				border-radius: 40px;
				padding: 8px 32px 8px 16px;
				font-size: 0.92rem;
				color: #2d241d;
				outline: none;
				cursor: pointer;
				font-family: inherit;
				-webkit-appearance: none;
				-moz-appearance: none;
				appearance: none;
				width: 100%;
				background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23675845' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
				background-repeat: no-repeat;
				background-position: right 12px center;
				background-size: 14px;
			}

			/* 上下篇按钮 */
			.nav-buttons {
				display: flex;
				gap: 5px;
			}

			.nav-btn {
				background: #f0e8dd;
				border: 1px solid #cbbaa8;
				border-radius: 40px;
				padding: 6px 14px;
				font-size: 0.88rem;
				color: #4d3e2e;
				cursor: pointer;
				transition: background 0.1s;
				display: inline-flex;
				align-items: center;
				gap: 3px;
				white-space: nowrap;
			}

			.nav-btn:active {
				background: #e1d3c2;
			}

			.nav-btn.disabled {
				opacity: 0.4;
				pointer-events: none;
			}

			/* 新增：LOFTER链接区域 */
			.lofter-link {
				display: flex;
				align-items: center;
				gap: 8px;
				background: #f0e8dd;
				border-radius: 40px;
				padding: 6px 16px 6px 12px;
				border: 1px solid #cbbaa8;
				cursor: pointer;
				transition: background 0.2s;
				white-space: nowrap;
				font-size: 0.9rem;
				color: #4d3e2e;
				text-decoration: none;
			}

			.lofter-link:hover {
				background: #e1d3c2;
			}

			.lofter-link:active {
				background: #d2c1ad;
			}

			.lofter-link span {
				font-size: 1.2rem;
			}

			/* 阅读区 - 滑动核心 */
			.text-content {
				background: transparent;
				padding: 8px 6px;
				font-size: 1.1rem;
				line-height: 1.75;
				color: #2d241d;

				flex: 1;
				min-height: 0;

				overflow-y: auto;
				-webkit-overflow-scrolling: touch;
				scroll-behavior: smooth;

				scrollbar-width: none;
				-ms-overflow-style: none;

				white-space: pre-wrap;
				word-wrap: break-word;

				background: linear-gradient(#fdf9f2 30%, rgba(253, 249, 242, 0)),
					linear-gradient(rgba(253, 249, 242, 0), #fdf9f2 70%) 0 100%,
					radial-gradient(farthest-side at 50% 0, rgba(0, 0, 0, 0.05), rgba(0, 0, 0, 0)),
					radial-gradient(farthest-side at 50% 100%, rgba(0, 0, 0, 0.05), rgba(0, 0, 0, 0)) 0 100%;
				background-repeat: no-repeat;
				background-size: 100% 40px, 100% 40px, 100% 20px, 100% 20px;
				background-attachment: local, local, scroll, scroll;
				background-color: #fdf9f2;
			}

			.text-content::-webkit-scrollbar {
				display: none;
				width: 0;
				background: transparent;
			}

			/* 底部功能区 - 增强版 */
			.footer-note {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-top: 4px;
				padding-top: 8px;
				border-top: 1px solid #ddd0bf;
				color: #9f8c7a;
				font-size: 0.75rem;
				flex-shrink: 0;
			}

			.footer-left {
				display: flex;
				align-items: center;
				gap: 12px;
				flex-wrap: wrap;
			}

			.copy-badge {
				display: flex;
				align-items: center;
				gap: 4px;
				background: transparent;
				color: #7d6853;
			}

			.footer-stats {
				display: flex;
				align-items: center;
				gap: 8px;
				font-size: 0.75rem;
				color: #9b8a78;
			}

			.footer-stats span {
				display: flex;
				align-items: center;
				gap: 2px;
			}

			/* 移动端优化 */
			@media (max-width: 600px) {
				.reader {
					padding: 10px 12px 8px 12px;
				}

				.reader-header {
					flex-direction: column;
					align-items: stretch;
					gap: 6px;
					margin-bottom: 4px;
					padding-bottom: 6px;
				}

				.chapter-bar {
					justify-content: space-between;
				}

				.chapter-select-wrap {
					flex: 1;
					min-width: 130px;
				}

				.nav-btn {
					padding: 8px 14px;
					font-size: 0.9rem;
				}

				.text-content {
					font-size: 1rem;
					padding: 4px 4px;
					-webkit-overflow-scrolling: touch;
				}

				.owner-name {
					font-size: 1.5rem;
				}

				.owner-name small {
					font-size: 0.85rem;
				}

				.footer-left {
					gap: 8px;
				}

				.lofter-link {
					padding: 5px 12px 5px 10px;
					font-size: 0.85rem;
				}
			}

			/* 大屏适配 */
			@media (min-width: 1024px) {
				body {
					padding: 20px;
					background: #d6c9b8;
				}

				.reader {
					max-width: 900px;
					height: 95vh;
					border-radius: 32px;
					border: 1px solid #e0d2c0;
					box-shadow: 0 12px 32px rgba(0, 0, 0, 0.1);
					padding: 28px 32px 24px 32px;
				}

				.text-content {
					scrollbar-width: thin;
					scrollbar-color: #bcab99 #f0e8dd;
					padding: 12px 16px;
					background: #fdf9f2;
				}

				.text-content::-webkit-scrollbar {
					display: block;
					width: 6px;
				}

				.text-content::-webkit-scrollbar-track {
					background: #f0e8dd;
				}

				.text-content::-webkit-scrollbar-thumb {
					background: #bcab99;
					border-radius: 12px;
				}

				.footer-note {
					font-size: 0.85rem;
				}
			}

			/* 不可选中强化 */
			.reader,
			.reader * {
				user-select: none !important;
			}
		</style>
	</head>
	<body>
		<div class="reader">
			<!-- 头部区域 - 整合LOFTER链接 -->
			<div class="reader-header">
				<div class="owner-name">
					凤鳞·毛鸿 <small>储藏·阅</small>
				</div>
				<div class="chapter-bar">
					<!-- LOFTER链接按钮 - 显著位置 -->
					<a href="https://fenglinmaohong.lofter.com" target="_blank" rel="noopener noreferrer"
						class="lofter-link">
						<span>📷</span> LOFTER主页
					</a>
					<div class="chapter-select-wrap">
						<select id="chapterSelect">
							<option value="">— 选篇 —</option>
						</select>
					</div>
					<div class="nav-buttons">
						<div class="nav-btn" id="prevBtn" title="上一篇">◀ 上篇</div>
						<div class="nav-btn" id="nextBtn" title="下一篇">下篇 ▶</div>
					</div>
				</div>
			</div>

			<!-- 阅读区：支持上下滑动 -->
			<div class="text-content" id="privateText">
				<!-- 初始内容通过js填充 -->
			</div>

			<!-- 底部功能区 - 丰富信息 -->
			<div class="footer-note">
				<div class="footer-left">
					<div class="copy-badge">
						<span>🛡️</span> 不可复制
					</div>
					<div class="footer-stats">
						<span>📚 储藏文章</span>
						<span id="chapterCount">2篇</span>
					</div>
				</div>
				<div>
					<span>📖 仅供阅读 · 滑动浏览</span>
				</div>
			</div>
		</div>

		<script>
			(function() {
				// ---------- 防复制模块 (强化) ----------
				const events = ['copy', 'cut', 'contextmenu', 'selectstart', 'dragstart', 'selectionchange'];
				events.forEach(ev => {
					document.addEventListener(ev, (e) => {
						e.preventDefault();
						e.stopPropagation();
						return false;
					}, {
						capture: true
					});
				});
				document.addEventListener('keydown', (e) => {
					const isCtrl = e.ctrlKey || e.metaKey;
					if (isCtrl && ['c', 'x', 'a', 'p', 's'].includes(e.key.toLowerCase())) e.preventDefault();
					if (e.key === 'F12' || e.key === 'PrintScreen') e.preventDefault();
				}, {
					capture: true
				});

				// 锁定鼠标/触摸事件
				const container = document.getElementById('privateText');
				if (container) {
					container.addEventListener('mousedown', (e) => e.preventDefault());
					container.addEventListener('mouseup', (e) => e.preventDefault());
					container.addEventListener('touchstart', (e) => e.preventDefault());
					container.addEventListener('touchend', (e) => e.preventDefault());
				}

				// 定期清除选区
				setInterval(() => {
					const sel = window.getSelection();
					if (sel && sel.toString().length > 0) sel.removeAllRanges();
				}, 250);

				// ---------- 章节数据 ----------
				const chapterList = [{
						name: '[安柯]情感共犯（上）',
						file: '[安柯]情感共犯（上）.txt'
					},
					{
						name: '[安柯]情感共犯（下）',
						file: '[安柯]情感共犯（下）.txt'
					}
					// 可继续添加更多章节
				];

				const selectEl = document.getElementById('chapterSelect');
				const textDisplay = document.getElementById('privateText');
				const prevBtn = document.getElementById('prevBtn');
				const nextBtn = document.getElementById('nextBtn');
				const chapterCountSpan = document.getElementById('chapterCount');

				let currentIndex = -1;

				// 更新文章数量显示
				if (chapterCountSpan) {
					chapterCountSpan.textContent = chapterList.length + '篇';
				}

				// 初始化下拉框
				function populateSelect() {
					selectEl.innerHTML = '<option value="">— 选择卷次 —</option>';
					chapterList.forEach((ch, idx) => {
						const option = document.createElement('option');
						option.value = idx;
						option.textContent = ch.name;
						option.dataset.file = ch.file;
						selectEl.appendChild(option);
					});
				}

				// 加载章节
				async function loadChapterByIndex(index) {
					if (index < 0 || index >= chapterList.length) {
						textDisplay.textContent = '—— 无更多章节 ——';
						currentIndex = -1;
						selectEl.value = '';
						updateNavButtons();
						return;
					}

					const chapter = chapterList[index];
					selectEl.value = index;
					textDisplay.textContent = '📖 载入中……';

					const fileName = chapter.file;
					const encodedFile = encodeURIComponent(fileName);
					const filePath = `TXT/${encodedFile}`;

					try {
						const response = await fetch(filePath);
						if (!response.ok) throw new Error(`无法加载 (${response.status})`);
						const text = await response.text();
						textDisplay.textContent = text;
						currentIndex = index;
					} catch (error) {
						console.error('加载失败:', error);
						textDisplay.textContent = `❌ 文件不存在：TXT/${fileName}\n请将txt文件放入 TXT 文件夹，并检查文件名是否匹配。\n\n当前储藏文章列表：\n${
            chapterList.map((ch, i) => `${i+1}. ${ch.name}`).join('\n')
          }`;
						currentIndex = -1;
						selectEl.value = '';
					} finally {
						updateNavButtons();

						// 加载完成后，自动滚动到顶部
						if (textDisplay) {
							textDisplay.scrollTop = 0;
						}
					}
				}

				// 更新上下篇按钮状态
				function updateNavButtons() {
					if (currentIndex === -1) {
						prevBtn.classList.add('disabled');
						nextBtn.classList.add('disabled');
						return;
					}
					if (currentIndex > 0) {
						prevBtn.classList.remove('disabled');
					} else {
						prevBtn.classList.add('disabled');
					}
					if (currentIndex < chapterList.length - 1) {
						nextBtn.classList.remove('disabled');
					} else {
						nextBtn.classList.add('disabled');
					}
				}

				// 事件监听
				selectEl.addEventListener('change', (e) => {
					const val = e.target.value;
					if (val === '') {
						textDisplay.textContent =
							'请从上方选择篇章……\n\n这是凤鳞·毛鸿的个人储藏室，存放无法在LOFTER发布的文章。点击LOFTER链接可前往主站查看更多作品，感谢对凤鳞的支持。\n网页代码由DeepSeek提供支持，页面开源发布于GitHub，感谢技术支持。';
						currentIndex = -1;
						updateNavButtons();
						return;
					}
					const idx = parseInt(val, 10);
					if (!isNaN(idx) && idx >= 0 && idx < chapterList.length) {
						loadChapterByIndex(idx);
					}
				});

				prevBtn.addEventListener('click', () => {
					if (currentIndex > 0) {
						loadChapterByIndex(currentIndex - 1);
					}
				});

				nextBtn.addEventListener('click', () => {
					if (currentIndex < chapterList.length - 1) {
						loadChapterByIndex(currentIndex + 1);
					}
				});

				// 初始化
				populateSelect();
				textDisplay.textContent =
					'请从上方选择篇章……\n\n这是凤鳞·毛鸿的个人储藏室，存放无法在LOFTER发布的文章。点击LOFTER链接可前往主站查看更多作品，感谢对凤鳞的支持。\n网页代码由DeepSeek提供支持，页面开源发布于GitHub，感谢技术支持。';
				updateNavButtons();

				// 增强触摸滑动体验
				let touchStartY = 0;

				textDisplay.addEventListener('touchstart', (e) => {
					touchStartY = e.touches[0].clientY;
				}, {
					passive: true
				});

				// 为阅读区添加滚动位置记忆功能（可选）
				let lastScrollTop = 0;
				textDisplay.addEventListener('scroll', () => {
					lastScrollTop = textDisplay.scrollTop;
				}, {
					passive: true
				});

				// 额外功能：显示当前阅读进度（可选）
				function updateReadingProgress() {
					// 可以留作后续扩展
				}

			})();
		</script>
	</body>
</html>
