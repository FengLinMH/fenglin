<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>凤鳞毛鸿 · 卷册</title>
  <style>
    /* === 极简重置 + 防复制 === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    body {
      background: #ece3d8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Georgia", "Times New Roman", "Songti SC", serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }

    /* 阅读卡片 */
    .reader {
      width: 100%;
      max-width: 820px;
      background: #fdf9f2;
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05), 0 2px 6px rgba(0, 0, 0, 0.05);
      padding: 20px 18px 22px 18px;
      border: 1px solid #e0d2c0;
    }

    /* 头部：主人名 + 章节标记 */
    .reader-header {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #dacfc1;
      gap: 10px;
    }

    .owner-name {
      font-size: 1.7rem;
      font-weight: 340;
      color: #3b2e24;
      letter-spacing: 1.5px;
    }

    .owner-name small {
      font-size: 1rem;
      font-weight: 300;
      color: #8b715b;
      margin-left: 6px;
      letter-spacing: 0.5px;
    }

    /* 重新设计的章节选择器：简洁列表 + 上下篇 */
    .chapter-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* 篇章下拉框 (保留但简化) */
    .chapter-select-wrap {
      position: relative;
      min-width: 160px;
    }

    #chapterSelect {
      background: #f0e8dd;
      border: 1px solid #cbbaa8;
      border-radius: 40px;
      padding: 8px 32px 8px 16px;
      font-size: 0.98rem;
      color: #2d241d;
      outline: none;
      cursor: pointer;
      font-family: inherit;
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      width: 100%;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23675845' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 14px;
    }

    /* 上下篇按钮 */
    .nav-buttons {
      display: flex;
      gap: 6px;
    }

    .nav-btn {
      background: #f0e8dd;
      border: 1px solid #cbbaa8;
      border-radius: 40px;
      padding: 6px 16px;
      font-size: 0.95rem;
      color: #4d3e2e;
      cursor: pointer;
      transition: background 0.1s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .nav-btn:active {
      background: #e1d3c2;
    }

    .nav-btn.disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    /* 阅读区 — 解决手机滑动问题：使用-webkit-overflow-scrolling + 固定高度 */
    .text-content {
      background: transparent;
      padding: 4px 6px;
      margin: 12px 0 16px 0;
      font-size: 1.1rem;
      line-height: 1.75;
      color: #2d241d;
      
      /* 关键：确保可滑动 */
      max-height: 62vh;
      min-height: 260px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch; /* 平滑滑动 */
      overscroll-behavior: contain;      /* 避免边缘拖拽 */
      
      white-space: pre-wrap;
      word-wrap: break-word;
      scrollbar-width: thin;
      scrollbar-color: #bcab99 #f0e8dd;
      border: none; /* 无边框 */
    }

    /* 自定义滚动条 (可选) */
    .text-content::-webkit-scrollbar {
      width: 4px;
    }
    .text-content::-webkit-scrollbar-track {
      background: #ece1d3;
      border-radius: 8px;
    }
    .text-content::-webkit-scrollbar-thumb {
      background: #b7a28c;
      border-radius: 8px;
    }

    /* 底部防复制 */
    .footer-note {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
      padding-top: 12px;
      border-top: 1px solid #ddd0bf;
      color: #9f8c7a;
      font-size: 0.82rem;
    }

    .copy-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      color: #7d6853;
    }

    /* 移动端适配优化 */
    @media (max-width: 600px) {
      .reader-header {
        flex-direction: column;
        align-items: stretch;
      }
      .chapter-bar {
        justify-content: space-between;
      }
      .chapter-select-wrap {
        flex: 1;
        min-width: 140px;
      }
      .nav-buttons {
        flex-shrink: 0;
      }
      .nav-btn {
        padding: 8px 14px;
        font-size: 0.9rem;
      }
      .text-content {
        max-height: 58vh;
        font-size: 1rem;
        -webkit-overflow-scrolling: touch; /* 重申 */
      }
    }

    @media (max-width: 420px) {
      .reader { padding: 16px; }
      .owner-name { font-size: 1.5rem; }
      .chapter-bar { flex-wrap: wrap; gap: 8px; }
      .nav-buttons { width: 100%; justify-content: flex-end; }
    }

    /* 大屏留白自然 */
    @media (min-width: 1024px) {
      .reader { padding: 32px 38px; }
    }

    /* 不可选中强化 */
    .reader, .reader * {
      user-select: none !important;
    }
  </style>
</head>
<body>
  <div class="reader">
    <!-- 头部：主人 + 章节工具 -->
    <div class="reader-header">
      <div class="owner-name">
        凤鳞·毛鸿 <small>书盒</small>
      </div>
      <div class="chapter-bar">
        <div class="chapter-select-wrap">
          <select id="chapterSelect">
            <option value="">— 选篇 —</option>
          </select>
        </div>
        <div class="nav-buttons">
          <div class="nav-btn" id="prevBtn" title="上一篇">◀ 上篇</div>
          <div class="nav-btn" id="nextBtn" title="下一篇">下篇 ▶</div>
        </div>
      </div>
    </div>

    <!-- 阅读区：滑动由CSS保证，修复手机无法滑动问题 -->
    <div class="text-content" id="privateText">
      <!-- 初始内容会通过js填充 -->
    </div>

    <!-- 底部防复制标识 -->
    <div class="footer-note">
      <div><span>📖</span> 仅供阅读</div>
      <div class="copy-badge"><span>🛡️</span> 不可复制</div>
    </div>
  </div>

  <script>
    (function() {
      // ---------- 防复制模块 (强化) ----------
      const events = ['copy', 'cut', 'contextmenu', 'selectstart', 'dragstart', 'selectionchange'];
      events.forEach(ev => {
        document.addEventListener(ev, (e) => { e.preventDefault(); e.stopPropagation(); return false; }, { capture: true });
      });
      document.addEventListener('keydown', (e) => {
        const isCtrl = e.ctrlKey || e.metaKey;
        if (isCtrl && ['c', 'x', 'a', 'p', 's'].includes(e.key.toLowerCase())) e.preventDefault();
        if (e.key === 'F12' || e.key === 'PrintScreen') e.preventDefault();
      }, { capture: true });

      // 锁定鼠标事件
      const container = document.getElementById('privateText');
      if (container) {
        container.addEventListener('mousedown', (e) => e.preventDefault());
        container.addEventListener('mouseup', (e) => e.preventDefault());
        container.addEventListener('touchstart', (e) => e.preventDefault());
        container.addEventListener('touchend', (e) => e.preventDefault());
      }

      // 定期清除选区
      setInterval(() => {
        const sel = window.getSelection();
        if (sel && sel.toString().length > 0) sel.removeAllRanges();
      }, 250);

      // ---------- 核心：章节数据 (基于现有文件扩展) ----------
      // 用户可以在此自由增删章节，程序自动处理上下篇
      const chapterList = [
        { name: '[安柯]情感共犯（上）', file: '[安柯]情感共犯（上）.txt' },
        { name: '[安柯]情感共犯（下）', file: '[安柯]情感共犯（下）.txt' }
        // 如果有更多章节，继续添加即可，上下篇自动对应顺序
      ];

      const selectEl = document.getElementById('chapterSelect');
      const textDisplay = document.getElementById('privateText');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');

      let currentIndex = -1;  // -1 表示未选择任何章节

      // 初始化下拉框
      function populateSelect() {
        selectEl.innerHTML = '<option value="">— 选择卷次 —</option>';
        chapterList.forEach((ch, idx) => {
          const option = document.createElement('option');
          option.value = idx;  // 直接用索引作为value，方便
          option.textContent = ch.name;
          option.dataset.file = ch.file; // 保留文件名
          selectEl.appendChild(option);
        });
      }

      // 根据索引加载章节
      async function loadChapterByIndex(index) {
        if (index < 0 || index >= chapterList.length) {
          // 越界：清空显示
          textDisplay.textContent = '—— 无更多章节 ——';
          currentIndex = -1;
          selectEl.value = '';
          updateNavButtons();
          return;
        }

        const chapter = chapterList[index];
        // 更新下拉框显示 (不触发change事件)
        selectEl.value = index;

        // 显示加载中
        textDisplay.textContent = '📖 载入中……';

        const fileName = chapter.file;
        const encodedFile = encodeURIComponent(fileName);
        const filePath = `TXT/${encodedFile}`;  // 相对路径 TXD 文件夹

        try {
          const response = await fetch(filePath);
          if (!response.ok) throw new Error(`无法加载 (${response.status})`);
          const text = await response.text();
          textDisplay.textContent = text;
          currentIndex = index;   // 更新当前索引
        } catch (error) {
          console.error('加载失败:', error);
          textDisplay.textContent = `❌ 文件不存在：TXT/${fileName}\n请将txt文件放入 TXT 文件夹，并检查文件名是否匹配。`;
          currentIndex = -1;      // 加载失败视为无当前章节
          selectEl.value = '';    // 清空选中
        } finally {
          updateNavButtons();
        }
      }

      // 更新上下篇按钮状态
      function updateNavButtons() {
        if (currentIndex === -1) {
          prevBtn.classList.add('disabled');
          nextBtn.classList.add('disabled');
          return;
        }
        // 上篇：索引大于0可用
        if (currentIndex > 0) {
          prevBtn.classList.remove('disabled');
        } else {
          prevBtn.classList.add('disabled');
        }
        // 下篇：索引小于最后一项
        if (currentIndex < chapterList.length - 1) {
          nextBtn.classList.remove('disabled');
        } else {
          nextBtn.classList.add('disabled');
        }
      }

      // 事件监听：下拉选择
      selectEl.addEventListener('change', (e) => {
        const val = e.target.value;
        if (val === '') {
          // 清空
          textDisplay.textContent = '请从上方选择章节……（本网页由腾讯云支持并凤鳞个人部署）注:页面仅支持基础的阅读功能,没有写内置字数调节和其他样式，文章仅供学术交流，其他不良影响可联系作者进行删除，谢谢配合。';
          currentIndex = -1;
          updateNavButtons();
          return;
        }
        const idx = parseInt(val, 10);
        if (!isNaN(idx) && idx >= 0 && idx < chapterList.length) {
          loadChapterByIndex(idx);
        }
      });

      // 上篇
      prevBtn.addEventListener('click', () => {
        if (currentIndex > 0) {
          loadChapterByIndex(currentIndex - 1);
        }
      });

      // 下篇
      nextBtn.addEventListener('click', () => {
        if (currentIndex < chapterList.length - 1) {
          loadChapterByIndex(currentIndex + 1);
        }
      });

      // 初始化填充
      populateSelect();
      textDisplay.textContent = '请从上方选择篇章……';
      updateNavButtons();

      // 可选：默认加载第一个（注释掉，让用户自选）
      // if (chapterList.length > 0) {
      //   loadChapterByIndex(0);
      // }

      // 修复手机滑动：确保textContent获得正确的overflow且无外部干扰
      // 同时也加一个touchmove防止页面整体滑动（保留）
      document.body.addEventListener('touchmove', (e) => {
        // 如果触摸的目标不是阅读区或者阅读区已经在顶部/底部并且试图继续滚动，可以阻止页面整体滚动
        // 这里简单处理：不阻止body滚动，让阅读区内部滚动即可。但为了保险，当阅读区可滚动时，我们阻止body滚动？
        // 更好的做法：不干预，依靠-webkit-overflow-scrolling。
      }, { passive: false });
      
      // 额外确保阅读区可以触屏滑动 (已经通过CSS实现)
    })();
  </script>
</body>
</html>
